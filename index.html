<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verse Hide-and-Seek</title>
  <style>
    :root {
      --sky: #7dd3fc;
      --sun: #fcd34d;
      --grass: #86efac;
      --card: #fff9e6;
      --ink: #2b2b2b;
      --accent: #8b5cf6;
      --accent2: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Comic Sans MS", sans-serif;
      background:
        linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.45)),
        repeating-linear-gradient(
          0deg,
          #8b5a2b 0,
          #8b5a2b 4px,
          #5f3b1c 4px,
          #5f3b1c 8px
        );
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      color: #f4f1d0;
    }

    .game {
      width: min(900px, 100%);
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(6px);
      border: 4px solid #ffffff;
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
      padding: 28px;
      text-align: center;
    }

    .title {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      color: var(--accent);
      text-shadow: 2px 2px 0 #fff;
    }

    .subtitle {
      margin: 0 0 24px;
      font-size: 1.1rem;
      color: #4b5563;
    }

    .verse-card {
      background: var(--card);
      border: 4px dashed #f59e0b;
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 22px;
    }

    .verse {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 8px;
      justify-content: center;
      align-items: center;
      font-size: clamp(1.25rem, 2.4vw, 2rem);
      line-height: 1.8;
    }

    .word {
      background: #fff;
      color: #000;
      border: 2px solid #c4b5fd;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease, background 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 5px 10px rgba(91, 33, 182, 0.12);
    }

    .word:hover {
      transform: scale(1.08) rotate(-1deg);
      background: #ede9fe;
    }

    .word.hidden {
      color: transparent;
      background: linear-gradient(90deg, #dbeafe, #fde68a);
      border-style: dashed;
    }

    .word.hidden::after {
      content: "🫥";
      margin-left: 2px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .controls button {
      min-width: 220px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 8px 16px rgba(139, 92, 246, 0.35);
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px) scale(1.02);
      filter: brightness(1.05);
    }

    .hint {
      margin-top: 14px;
      font-size: 0.95rem;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <div class="game">
    <h1 class="title">🪄 You see me, you see me not ✨<br>key passage (Daniel 4:3)</h1>
    <p class="subtitle">Click on a word to send it to the backrooms, and click the blank spot to bring it back to this sigma world p.s. Andrew Mei made this sentence!</p>

    <div class="verse-card">
      <div id="verse" class="verse" aria-label="Bible verse"></div>
    </div>

    <div class="controls">
      <button id="hideAllBtn" type="button">🙈 Hide Every Word in the Verse</button>
      <button id="resetBtn" type="button">🔄 Show the Full Verse Again</button>
    </div>

    <p class="hint">Click the buttons.</p>
  </div>

  <script>
    const verseText = "How great are his signs, how mighty his wonders! His kingdom is an everlasting kingdom, and his dominion endures from generation to generation.";
    const verseContainer = document.getElementById("verse");
    const resetBtn = document.getElementById("resetBtn");
    const hideAllBtn = document.getElementById("hideAllBtn");

    function buildVerse() {
      verseContainer.innerHTML = "";
      const words = verseText.split(" ");

      words.forEach((word) => {
        const span = document.createElement("span");
        span.className = "word";
        span.textContent = word;
        span.addEventListener("click", () => {
          span.classList.toggle("hidden");
        });
        verseContainer.appendChild(span);
      });
    }

    hideAllBtn.addEventListener("click", () => {
      const words = verseContainer.querySelectorAll(".word");
      words.forEach((word) => {
        word.classList.add("hidden");
      });
    });

    resetBtn.addEventListener("click", () => {
      buildVerse();
    });

    buildVerse();
  </script>
</body>
</html>
